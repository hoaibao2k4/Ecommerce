spring:
  config:
    import: optional:file:.env[.properties]
  # config mysql
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecommerce}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  # config sql
  sql:
    init:
      mode: always
      continue-on-error: true
  jackson:
    default-property-inclusion: non_null
    deserialization:
      accept-float-as-int: false # prevent float to int

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "http://localhost:8033/realms/Ecommerce-Realm"

server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api/v1}

  error:
    include-stacktrace: never
