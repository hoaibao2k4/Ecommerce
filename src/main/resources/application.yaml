spring:
  config:
    import: optional:file:.env[.properties]
  # config mysql
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  # config sql
  sql:
    init:
      mode: always
      continue-on-error: true
  jackson:
    default-property-inclusion: non_null
    deserialization:
      accept-float-as-int: false # prevent float to int

  #config redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 60000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "http://localhost:8033/realms/Ecommerce-Realm"

server:
  port: ${SERVER_PORT}
  forward-headers-strategy: framework
  servlet:
    context-path: ${SERVER_CONTEXT_PATH}

  error:
    include-stacktrace: never
